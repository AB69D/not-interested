name: not_interested
description: "Screen nudity blur overlay app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # DI
  get_it: ^7.7.0
  injectable: ^2.4.4

  # State management (MVVM)
  provider: ^6.1.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Foreground service
  flutter_foreground_task: ^8.16.0

  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
