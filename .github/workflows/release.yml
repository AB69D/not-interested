name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  release:
    name: Build & publish signed APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Rename APK with version
        run: |
          VERSION="${{ github.ref_name }}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             "not-interested-${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Not Interested ${{ github.ref_name }}"
          body: |
            ## Download

            **[⬇ not-interested-${{ github.ref_name }}.apk](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/not-interested-${{ github.ref_name }}.apk)**

            ### Install
            1. Enable *Install from unknown sources* on your device
            2. Download the APK above
            3. Open and install

            ### What's new
            See [commits since last release](https://github.com/${{ github.repository }}/commits/main).
          files: not-interested-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
